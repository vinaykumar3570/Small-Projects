   <style>
      *{
         margin: 0;

         box-sizing: border-box;
         text-decoration: none;
         list-style-type: none;
         letter-spacing: 1.5px;
         font-family: sans-serif;
      }
      body{
         height: 100vh;
         width: 100%;
         display:flex;
         justify-content: center;
         align-items: center;
      }
      input{
         height: 50px;
         width: 400px;
         font-size: 24px;
         outline: none;
         padding: 0 5px;
      }
      button{
         margin: 10px;
         height: 50px;
         width: 150px;
         font-size: 24px;
         display: none;
      }
      input:not(:placeholder-shown) + button{
         display: block;
      }
   </style>
</head>

<body>
   <input type="search" name="" id="" placeholder="Search here...">
   <button> Search </button>
</body>
