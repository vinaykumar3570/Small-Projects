<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflected Text </title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: rgb(9, 5, 34);
        }
        .reflected{
            display: inline-block;
            width: max-content;
            padding: 0 10px;

        }
        .reflected > *{
            font-size: 5rem;
            font-weight: 700;
            color: #fff;
        }
        .reflected > :last-child {
            transform: rotateX(180deg) translateY(30px);
            mask-image: linear-gradient(transparent 50%, white 90%);
            -webkit-mask-image: linear-gradient(transparent 50%, white 90%);
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="reflected">
        <div> Reflected Text </div>
        <div> Reflected Text </div>
    </div>
</body>
</html>
